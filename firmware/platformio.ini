[env:nodemcuv2]
platform = espressif8266
board = nodemcuv2
framework = arduino
monitor_speed = 115200
; USB qayta ulanganda nom o'zgarishi mumkin — `pio device list` bilan tekshirib yangilang
upload_port = /dev/cu.usbserial-A5069RR4
monitor_port = /dev/cu.usbserial-A5069RR4
; 921600 ba'zi USB/kabel/adapterlarda stub yuklashda timeout beradi — barqaror: 115200 yoki 460800
upload_speed = 115200
lib_deps =
  knolleary/PubSubClient@^2.8
  bblanchon/ArduinoJson@^7.0.4
